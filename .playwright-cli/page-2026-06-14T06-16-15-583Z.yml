        - generic [ref=e102]: ".eid-btn{ font-family: var(--font-record); font-size: var(--type-1); letter-spacing: var(--track-meta); text-transform: uppercase; background: var(--surface-page); color: var(--text-primary); border: var(--border-hard); border-radius: var(--radius-none); padding: var(--space-1) var(--space-4); transition: background var(--motion-fast), color var(--motion-fast); } .eid-btn:hover, .eid-btn:focus-visible{ background: var(--surface-inverse); color: var(--text-inverse); } .eid-btn--sm{ font-size: var(--type-0); padding: 2px var(--space-3); } .eid-btn--danger{ border-color: var(--rule-danger); color: var(--text-danger); } .eid-btn--danger:hover{ background: var(--status-authority); color: var(--text-inverse); } .eid-btn--active-gm{ background: var(--status-authority); color: var(--text-inverse); border-color: var(--status-authority); } .eid-btn:disabled{ opacity: .4; cursor: not-allowed; }"
    - paragraph [ref=e104]: Hover and focus-visible share one rule — keyboard focus is at least as strong as hover. There is no opacity-dim or scale-shrink press state; the control simply inverts. Danger inverts to stamp red; active-gm is the only button that ships pre-filled.